<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Broadcast View</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Libre+Baskerville:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/broadcast.css">
</head>
<body>
  <div id="init-overlay">
    <img src="img/logo.svg" alt="" class="init-logo" id="init-logo">
    <p class="init-text">Click anywhere to initialize<br>broadcast audio</p>
  </div>

  <div id="phase-logo" class="phase hidden">
    <div class="logo-bg"></div>
    <div class="logo-content">
      <div class="logo-star left">★</div>
      <div class="logo-star right">★</div>
      <div id="logo-text-group" class="hidden">
        <div class="logo-text">WELCOME</div>
      </div>
      <img id="logo-custom-img" class="logo-custom hidden" src="img/logo.svg" alt="">
      <div class="logo-byline" id="logo-byline">A TechnoThatch Production</div>
    </div>
    <div class="logo-flash" id="logo-flash"></div>
  </div>

  <div id="phase-board" class="phase hidden">
    <div id="board-wrap">
      <div id="board-cats"></div>
      <div id="board-cat-covers"></div>
      <div id="board-grid-wrap">
        <div id="board-price-cover"><div class="price-cover-inner"></div></div>
        <div id="board-grid"></div>
      </div>
    </div>
    <div id="board-scores"></div>
  </div>

  <div id="phase-clue" class="phase hidden">
    <div id="clue-wrap">
      <div id="clue-top">
        <span id="clue-cat"></span>
        <span id="clue-val"></span>
      </div>
      <div id="clue-text"></div>
      <div id="clue-ans" class="hidden"></div>
      <div id="clue-timer-track">
        <div id="clue-timer-fill"></div>
      </div>
      <div id="clue-round-label"></div>
    </div>
    <div id="clue-scores"></div>
  </div>

  <div id="phase-dd" class="phase hidden">
    <div id="dd-bg"></div>
    <div id="dd-wrap">
      <div class="dd-star left">★</div>
      <div class="dd-star right">★</div>
        <div class="dd-title">BONUS</div>
        <div class="dd-title sub">CLUE!</div>
    </div>
  </div>

  <div id="phase-championship" class="phase hidden">
    <div id="championship-wrap">
      <div id="championship-hdr">CHAMPIONSHIP</div>
      <div id="championship-cat"></div>
      <div id="championship-text"></div>
      <div id="championship-ans" class="hidden"></div>
      <div id="championship-results"></div>
    </div>
    <div id="championship-scores"></div>
  </div>

  <div id="phase-outro" class="phase hidden">
    <div class="logo-bg"></div>
    <div class="logo-content">
      <img id="outro-logo" class="logo-custom hidden" src="img/logo.svg" alt="">
      <div class="logo-byline" id="outro-byline">Thanks for Playing!</div>
    </div>
  </div>

  <audio id="a-intro" preload="auto"></audio>
  <audio id="a-timesup" preload="auto"></audio>
  <audio id="a-dd" preload="auto"></audio>
  <audio id="a-think" preload="auto"></audio>
  <audio id="a-applause" preload="auto"></audio>
  <audio id="a-boardfill" preload="auto"></audio>
  <audio id="a-correct" preload="auto"></audio>
  <audio id="a-incorrect" preload="auto"></audio>
  <audio id="a-outro" preload="auto"></audio>

  <div id="phase-overlay"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/socket-client.js"></script>
  <script src="js/broadcast.js"></script>
</body>
</html>
