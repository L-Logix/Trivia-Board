<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Trivia Board - Broadcast</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/broadcast.css">
</head>
<body>
  <div id="init-overlay">
    <img src="img/logo.svg" alt="" class="init-logo" id="init-logo">
    <p class="init-text">Click anywhere to initialize<br>broadcast audio</p>
  </div>

  <div id="phase-logo" class="phase hidden">
    <div class="logo-bg"></div>
    <div class="logo-content">
      <div class="logo-star left">★</div>
      <div class="logo-star right">★</div>
      <div class="logo-text">TRIVIA</div>
      <div class="logo-text sub">BOARD!</div>
      <div class="logo-byline">A TechnoThatch Production</div>
    </div>
    <div class="logo-flash" id="logo-flash"></div>
  </div>

  <div id="phase-board" class="phase hidden">
    <div id="board-wrap">
      <div id="board-cats"></div>
      <div id="board-grid"></div>
    </div>
    <div id="board-scores"></div>
  </div>

  <div id="phase-clue" class="phase hidden">
    <div id="clue-wrap">
      <div id="clue-top">
        <span id="clue-cat"></span>
        <span id="clue-val"></span>
      </div>
      <div id="clue-text"></div>
      <div id="clue-ans" class="hidden"></div>
      <div id="clue-timer-track">
        <div id="clue-timer-fill"></div>
      </div>
    </div>
    <div id="clue-scores"></div>
  </div>

  <div id="phase-dd" class="phase hidden">
    <div id="dd-bg"></div>
    <div id="dd-wrap">
      <div class="dd-star left">★</div>
      <div class="dd-star right">★</div>
      <div class="dd-title">DAILY</div>
      <div class="dd-title sub">DOUBLE!</div>
    </div>
    <div class="dd-flash" id="dd-flash"></div>
  </div>

  <div id="phase-final" class="phase hidden">
    <div id="final-wrap">
      <div id="final-hdr">FINAL TRIVIA</div>
      <div id="final-cat"></div>
      <div id="final-text"></div>
      <div id="final-ans" class="hidden"></div>
      <div id="final-results"></div>
    </div>
    <div id="final-scores"></div>
  </div>

  <audio id="a-intro" preload="auto"></audio>
  <audio id="a-timesup" preload="auto"></audio>
  <audio id="a-dd" preload="auto"></audio>
  <audio id="a-think" preload="auto"></audio>
  <audio id="a-applause" preload="auto"></audio>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/socket-client.js"></script>
  <script src="js/broadcast.js"></script>
</body>
</html>
