<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trivia Board - Host Dashboard</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <div id="dash">
    <header id="dash-hdr">
      <div class="hdr-left">
        <h1>TRIVIA BOARD</h1>
        <span class="hdr-sub">Host Dashboard</span>
      </div>
      <div class="hdr-mid">
        <span id="phase-badge" class="badge idle">IDLE</span>
        <span id="round-badge" class="badge-r">ROUND 1</span>
      </div>
      <div class="hdr-right">
        <button id="btn-intro" class="b b-gold">START <kbd>SPACE</kbd></button>
        <button id="btn-r2" class="b b-blue">ROUND 2</button>
        <button id="btn-final" class="b b-red">FINAL</button>
        <button id="btn-reset" class="b b-ghost">RESET</button>
      </div>
    </header>

    <div id="dash-body">
      <div id="dash-grid">
        <div id="dash-cats"></div>
        <div id="dash-vals"></div>
      </div>
      <aside id="dash-side">
        <div class="card" id="card-timer">
          <div class="card-lbl">TIMER</div>
          <div id="timer-num">0.0</div>
        </div>
        <div class="card hidden" id="card-clue">
          <div class="card-lbl">CLUE CONTROLS</div>
          <div id="clue-info" class="card-info"></div>
          <button class="b b-gold b-full" id="btn-reveal">REVEAL ANSWER</button>
          <button class="b b-blue b-full" id="btn-board">RETURN TO BOARD</button>
          <div style="display:flex;gap:3px;margin-top:4px">
            <button class="b b-full" id="btn-correct" style="flex:1;background:linear-gradient(180deg,#1a8a3a,#0f6a2a);color:#fff">CORRECT</button>
            <button class="b b-full" id="btn-wrong" style="flex:1;background:linear-gradient(180deg,#d94a4a,#b03030);color:#fff">WRONG</button>
          </div>
        </div>
        <div class="card hidden" id="card-dd">
          <div class="card-lbl">DAILY DOUBLE</div>
          <button class="b b-gold b-full" id="btn-dd-show">SHOW CLUE</button>
        </div>
        <div class="card hidden" id="card-final">
          <div class="card-lbl">FINAL ROUND</div>
          <button class="b b-blue b-full" id="btn-think">PLAY THINK MUSIC</button>
          <button class="b b-red b-full" id="btn-reveal-final">REVEAL RESULTS</button>
          <button class="b b-ghost b-full" id="btn-applause">APPLAUSE</button>
        </div>
        <div class="card" id="card-help">
          <div class="card-lbl">SHORTCUTS</div>
          <div style="font-size:.55rem;color:rgba(255,255,255,.25);line-height:1.6">
            <b style="color:rgba(255,255,255,.4)">Right-click</b> revealed cell to re-hide<br>
            <b style="color:rgba(255,255,255,.4)">Double-click</b> value to edit points<br>
            <b style="color:rgba(255,255,255,.4)">Enter</b> custom amount & press Enter
          </div>
        </div>
      </aside>
    </div>

    <div id="dash-players"></div>
  </div>

  <div id="modal-reset" class="modal hidden">
    <div class="modal-bx">
      <h2>Reset Game?</h2>
      <p>All scores and progress will be lost.</p>
      <div class="modal-acts">
        <button class="b b-red" id="mreset-yes">YES</button>
        <button class="b b-ghost" id="mreset-no">CANCEL</button>
      </div>
    </div>
  </div>

  <div id="modal-final" class="modal hidden">
    <div class="modal-bx modal-w">
      <h2>Final Round Results</h2>
      <div id="final-form"></div>
      <div class="modal-acts">
        <button class="b b-gold" id="mfinal-go">REVEAL</button>
        <button class="b b-ghost" id="mfinal-no">CANCEL</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/socket-client.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
