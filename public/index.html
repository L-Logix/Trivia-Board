<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Broadcast Engine</title>
  <style>
    body { margin:0; background:#070b17; color:#e2e8f0; font-family:'Inter','Segoe UI',Arial,sans-serif; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; text-align:center; }
    #idx-logo { max-width:40%; max-height:30vh; object-fit:contain; margin-bottom:2rem; filter:drop-shadow(0 0 30px rgba(56,189,248,0.1)); }
    p { font-size:1.1rem; margin-bottom:2rem; color:rgba(148,163,184,0.6); }
    .links { display:flex; gap:1.5rem; flex-wrap:wrap; justify-content:center; }
    .links a { display:inline-block; padding:1rem 2rem; background:#38bdf8; color:#070b17; text-decoration:none; font-size:1.15rem; font-weight:600; border-radius:8px; transition:transform 0.2s, box-shadow 0.2s; box-shadow:0 4px 20px rgba(56,189,248,0.2); }
    .links a:hover { transform:scale(1.05); box-shadow:0 8px 30px rgba(56,189,248,0.3); }
    .links a.dash { background:rgba(148,163,184,0.08); color:#e2e8f0; border:1px solid rgba(148,163,184,0.12); box-shadow:none; }
    .links a.dash:hover { background:rgba(148,163,184,0.14); border-color:rgba(148,163,184,0.25); }
    footer { margin-top:3rem; font-size:0.8rem; color:rgba(148,163,184,0.2); }
  </style>
</head>
<body>
  <img id="idx-logo" src="img/logo.svg" alt="Logo">
  <p>TechnoThatch Software Solutions &mdash; Broadcast Engine</p>
  <div class="links">
    <a href="/broadcast" target="_blank">Open Broadcast View</a>
    <a href="/dashboard" class="dash" target="_blank">Open Host Dashboard</a>
  </div>
  <footer>Drag Broadcast to TV. Keep Dashboard on your laptop.</footer>
</body>
</html>
