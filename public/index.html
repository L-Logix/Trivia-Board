<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trivia Broadcast Engine</title>
  <style>
    body { margin: 0; background: #060ce9; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
    h1 { font-size: 3rem; margin-bottom: 0.5rem; color: #ffcc00; }
    p { font-size: 1.2rem; margin-bottom: 2rem; color: rgba(255,255,255,0.8); }
    .links { display: flex; gap: 2rem; }
    .links a { display: inline-block; padding: 1rem 2rem; background: #ffcc00; color: #060ce9; text-decoration: none; font-size: 1.3rem; font-weight: bold; border-radius: 8px; transition: transform 0.2s; }
    .links a:hover { transform: scale(1.05); background: #ffd633; }
    .links a.dash { background: #1a1a2e; color: #fff; }
    .links a.dash:hover { background: #2a2a4e; }
    footer { margin-top: 3rem; font-size: 0.8rem; color: rgba(255,255,255,0.4); }
  </style>
</head>
<body>
  <h1>Trivia Board!</h1>
  <p>TechnoThatch Software Solutions &mdash; Broadcast Engine</p>
  <div class="links">
    <a href="/broadcast" target="_blank">Open Broadcast View</a>
    <a href="/dashboard" class="dash" target="_blank">Open Host Dashboard</a>
  </div>
  <footer>Drag Broadcast to TV. Keep Dashboard on your laptop.</footer>
</body>
</html>
