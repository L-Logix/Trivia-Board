      - any-glob-to-any-file: public/**/*

server:
  - changed-files:
      - any-glob-to-any-file: src/server/**/*

cli:
  - changed-files:
      - any-glob-to-any-file: src/cli/**/*

scripts:
  - changed-files:
      - any-glob-to-any-file: scripts/**/*

