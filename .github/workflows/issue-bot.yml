name: Issue Bot
on:
  schedule:
    - cron: '0 6 * * *'
  pull_request:
    types: [opened]
  push:
    paths:
      - 'src/**'
      - 'bin/**'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write
  actions: write
  contents: read

jobs:
  scan-and-issue:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for code issues
        id: scan
        run: |
          mkdir -p /tmp/bot-scans

          # 1 — TODO/FIXME/HACK per file
          for f in $(find src/ bin/ -name "*.js" 2>/dev/null); do
            count=$(grep -c "TODO\|FIXME\|HACK\|XXX" "$f" 2>/dev/null || echo 0)
            if [ "$count" -gt 0 ]; then echo "$f|$count"; fi
          done > /tmp/bot-scans/todos.txt

          # 2 — console.log per file
          for f in $(find src/ bin/ -name "*.js" 2>/dev/null); do
            count=$(grep -c "console\.log" "$f" 2>/dev/null || echo 0)
            if [ "$count" -gt 0 ]; then echo "$f|$count"; fi
          done > /tmp/bot-scans/consolelogs.txt

          # 3 — Long functions
          awk '/function /{start=NR; name=$0; file=FILENAME} {if(start && NR-start>40){print file"|"name" at line "start; start=0}}' \
            src/server/*.js src/cli/*.js src/lib/*.js bin/*.js 2>/dev/null > /tmp/bot-scans/longfns.txt

          # 4 — Files >300 lines
          while IFS= read -r line; do
            lc=$(echo "$line" | awk '{print $1}')
            fn=$(echo "$line" | awk '{print $2}')
            if [ "$lc" -gt 300 ] 2>/dev/null; then echo "$fn|$lc lines"; fi
          done < <(wc -l src/**/*.js bin/*.js 2>/dev/null | sort -rn) > /tmp/bot-scans/bigfiles.txt

          # 5 — Commented-out code per file
          for f in $(find src/ bin/ -name "*.js" 2>/dev/null); do
            count=$(grep -c "^\s*//\s*\(var\|let\|const\|function\|if\|for\|while\|return\|console\)" "$f" 2>/dev/null || echo 0)
            if [ "$count" -gt 0 ]; then echo "$f|$count"; fi
          done > /tmp/bot-scans/commented.txt

          # 6 — Missing trailing newlines per file
          for f in $(find src/ bin/ -name "*.js" 2>/dev/null); do
            if [ -s "$f" ] && [ "$(tail -c1 "$f" | wc -l)" -eq 0 ]; then echo "$f"; fi
          done > /tmp/bot-scans/newnl.txt

          # 7 — Lines >120 chars per file
          for f in $(find src/ bin/ -name "*.js" 2>/dev/null); do
            count=$(awk 'length($0)>120' "$f" 2>/dev/null | wc -l)
            if [ "$count" -gt 0 ]; then echo "$f|$count"; fi
          done > /tmp/bot-scans/longlines.txt

          # 8 — Consecutive blank lines (>2) per file
          for f in $(find src/ bin/ -name "*.js" 2>/dev/null); do
            count=$(awk '/^$/{n++} !/^$/{n=0} n>2{c++} END{print c}' "$f" 2>/dev/null)
            if [ "$count" -gt 0 ] 2>/dev/null; then echo "$f|$count"; fi
          done > /tmp/bot-scans/blanklines.txt

          echo "todos=$(wc -l < /tmp/bot-scans/todos.txt)" >> $GITHUB_OUTPUT
          echo "logs=$(wc -l < /tmp/bot-scans/consolelogs.txt)" >> $GITHUB_OUTPUT
          echo "longfns=$(wc -l < /tmp/bot-scans/longfns.txt)" >> $GITHUB_OUTPUT
          echo "bigfiles=$(wc -l < /tmp/bot-scans/bigfiles.txt)" >> $GITHUB_OUTPUT
          echo "commented=$(wc -l < /tmp/bot-scans/commented.txt)" >> $GITHUB_OUTPUT
          echo "newnl=$(wc -l < /tmp/bot-scans/newnl.txt)" >> $GITHUB_OUTPUT
          echo "longlines=$(wc -l < /tmp/bot-scans/longlines.txt)" >> $GITHUB_OUTPUT
          echo "blanklines=$(wc -l < /tmp/bot-scans/blanklines.txt)" >> $GITHUB_OUTPUT

      - name: Create issues from findings
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const scanDir = '/tmp/bot-scans';

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'bot-generated'
            });
            const existingTitles = new Set(existing.data.map(i => i.title));

            function readLines(file) {
              try {
                const raw = fs.readFileSync(path.join(scanDir, file), 'utf8');
                return raw.split('\n').filter(l => l.trim());
              } catch(e) { return []; }
            }

            function createIssue(title, body) {
              if (existingTitles.has(title)) {
                console.log('Skipping duplicate: ' + title);
                return;
              }
              existingTitles.add(title);
              return github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['bot-generated', 'bots-only']
              });
            }

            const todos = readLines('todos.txt');
            const logs = readLines('consolelogs.txt');
            const fns = readLines('longfns.txt');
            const big = readLines('bigfiles.txt');
            const commented = readLines('commented.txt');
            const newnl = readLines('newnl.txt');
            const longlines = readLines('longlines.txt');
            const blanklines = readLines('blanklines.txt');

            let created = 0;

            // Individual TODO issues per file
            for (const line of todos.slice(0, 4)) {
              const parts = line.split('|');
              const file = parts[0];
              const count = parts[1] || 'several';
              const short = file.replace(/^.*[\\/]/, '');
              const title = 'Resolve TODO/FIXME in ' + short;
              const body = '## TODO/FIXME in ' + file + '\n\n' +
                'Found **' + count + '** unresolved TODO/FIXME/HACK/XXX comment(s) in ' + file + '.\n\n' +
                '**Action:** Review and resolve each item.\n\n' +
                '*Worker bot: Are these still relevant?*';
              createIssue(title, body);
              created++;
            }

            // Individual console.log issues per file
            for (const line of logs.slice(0, 4)) {
              const parts = line.split('|');
              const file = parts[0];
              const count = parts[1] || 'several';
              const short = file.replace(/^.*[\\/]/, '');
              const title = 'Remove console.log from ' + short;
              const body = '## console.log in ' + file + '\n\n' +
                'Found **' + count + '** `console.log` call(s) in ' + file + '.\n\n' +
                '**Action:** Remove or replace with proper logging.\n\n' +
                '*Worker bot: Are these still needed for debugging?*';
              createIssue(title, body);
              created++;
            }

            // Individual long function issues
            for (const line of fns.slice(0, 4)) {
              const parts = line.split('|');
              const file = parts[0] || 'unknown';
              const detail = parts[1] || line;
              const short = file.replace(/^.*[\\/]/, '');
              const title = 'Refactor long function in ' + short;
              const body = '## Long Function Detected\n\n' +
                'In `' + file + '`:\n\n```\n' + detail + '\n```\n\n' +
                '**Action:** Refactor this function into smaller units.\n\n' +
                '*Worker bot: Is this a priority to refactor?*';
              createIssue(title, body);
              created++;
            }

            // Individual large file issues
            for (const line of big.slice(0, 4)) {
              const parts = line.split('|');
              const file = parts[0];
              const detail = parts[1] || '';
              const short = file.replace(/^.*[\\/]/, '');
              const title = 'Break down large file ' + short;
              const body = '## Large File: ' + file + '\n\n' +
                'This file is **' + detail + '**. Consider splitting into smaller modules.\n\n' +
                '**Action:** Break down into focused modules.\n\n' +
                '*Worker bot: Which part should be extracted first?*';
              createIssue(title, body);
              created++;
            }

            // Individual commented-out code issues
            for (const line of commented.slice(0, 4)) {
              const parts = line.split('|');
              const file = parts[0];
              const count = parts[1] || 'several';
              const short = file.replace(/^.*[\\/]/, '');
              const title = 'Remove commented-out code in ' + short;
              const body = '## Commented-Out Code in ' + file + '\n\n' +
                'Found **' + count + '** commented-out code block(s) in ' + file + '.\n\n' +
                '**Action:** Remove dead code.\n\n' +
                '*Worker bot: Can I safely remove these?*';
              createIssue(title, body);
              created++;
            }

            // Missing trailing newlines
            for (const file of newnl.slice(0, 4)) {
              const short = file.replace(/^.*[\\/]/, '');
              const title = 'Add trailing newline to ' + short;
              const body = '## Missing Trailing Newline\n\n' +
                'File `' + file + '` is missing a trailing newline.\n\n' +
                '**Action:** Add a newline at end of file.';
              createIssue(title, body);
              created++;
            }

            // Long lines
            for (const line of longlines.slice(0, 4)) {
              const parts = line.split('|');
              const file = parts[0];
              const count = parts[1] || 'several';
              const short = file.replace(/^.*[\\/]/, '');
              const title = 'Shorten long lines in ' + short;
              const body = '## Lines Exceeding 120 Characters\n\n' +
                'File `' + file + '` has **' + count + '** line(s) over 120 characters.\n\n' +
                '**Action:** Break long lines for readability.';
              createIssue(title, body);
              created++;
            }

            // Consecutive blank lines
            for (const line of blanklines.slice(0, 4)) {
              const parts = line.split('|');
              const file = parts[0];
              const count = parts[1] || 'several';
              const short = file.replace(/^.*[\\/]/, '');
              const title = 'Remove extra blank lines in ' + short;
              const body = '## Consecutive Blank Lines\n\n' +
                'File `' + file + '` has **' + count + '** instance(s) of >2 consecutive blank lines.\n\n' +
                '**Action:** Reduce to at most one blank line between sections.';
              createIssue(title, body);
              created++;
            }

            console.log('Created ' + created + ' new issues');

            // Trigger worker-bot to immediately process new issues
            if (created > 0) {
              const repoInfo = await github.rest.repos.get({
                owner: context.repo.owner,
                repo: context.repo.repo
              });
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'worker-bot.yml',
                ref: repoInfo.data.default_branch
              });
              console.log('Triggered worker-bot on ' + repoInfo.data.default_branch);
            }

  # ── Respond when someone replies ──
  respond-to-reply:
    if: github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const commenter = context.payload.comment.user.login;
            if (commenter === 'github-actions[bot]') return;

            const issueNum = context.payload.issue.number;
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNum
            });

            const labels = issue.data.labels.map(l => l.name);
            if (!labels.includes('bots-only')) return;

            const reply = (context.payload.comment.body || '').toLowerCase();
            let response;
            if (/good job|looks good|nice|great|thanks/i.test(reply)) {
              response = 'Issue bot: Glad it worked! Worker bot will keep improving the codebase.';
            } else if (/remove|delete|not needed|no/i.test(reply)) {
              response = 'Issue bot: Understood. Worker bot will clean these up.';
            } else if (/keep|still.*need|debug|active|yes/i.test(reply)) {
              response = 'Issue bot: Noted. I will leave these in place.';
            } else {
              response = 'Issue bot: Thanks for the feedback.';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNum,
              body: response
            });

  # ── Auto-review PRs that fix bots-only issues ──
  review-pr:
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const prBody = (context.payload.pull_request.body || '');
            const prNum = context.payload.pull_request.number;
            const prAuthor = context.payload.pull_request.user.login;
            if (prAuthor !== 'github-actions[bot]') return;

            const match = prBody.match(/Fixes\s+#(\d+)/i);
            if (!match) return;

            const issueNum = parseInt(match[1]);
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNum
            });

            const labels = issue.data.labels.map(l => l.name);
            if (!labels.includes('bots-only')) return;

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNum,
              event: 'APPROVE',
              body: 'Good job, Worker bot! The fix looks correct. Thanks for keeping the codebase clean.'
            });
