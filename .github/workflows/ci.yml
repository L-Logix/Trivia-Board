name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Run stress tests
        id: stress
        run: npm run stress
        continue-on-error: true

      - name: Create issue on failure (push only, not PR)
        if: steps.stress.outcome == 'failure' && github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'CI failure: stress tests failed (Node.js ${{ matrix.node-version }})';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'auto-fail'
            });
            if (issues.find(i => i.title === title)) {
              console.log('Issue already exists, skipping');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              labels: ['auto-fail', 'bot-generated', 'no-public-action', 'ci-failure'],
              body: [
                '## CI Failure (Auto-generated)',
                '',
                '| Field | Value |',
                '| --- | --- |',
                '| Node.js | ${{ matrix.node-version }} |',
                '| Commit | [`' + context.sha.substring(0, 7) + '`](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/commit/' + context.sha + ') |',
                '| Run | [Actions #' + context.runId + '](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ') |',
                '| Branch | `' + (context.ref || 'unknown').replace('refs/heads/', '') + '` |',
                '',
                'The stress test suite failed on this commit.',
                '',
                '### Investigation steps',
                '',
                '1. Open the Actions run link above',
                '2. Look at the failing Node.js version (${{ matrix.node-version }}) output',
                '3. Check if the failure is consistent across all Node versions',
                '',
                '---',
                '',
                '_This issue was automatically created by the CI workflow. It is tagged `no-public-action` — it exists for tracking and investigation purposes only._'
              ].join('\n')
            });

      - name: Fail the job if stress failed
        if: steps.stress.outcome == 'failure'
        run: exit 1
