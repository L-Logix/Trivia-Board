name: Stale Issues & PRs

on:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been inactive for 60 days. It will be closed in 14 days
            unless there is new activity. If the issue is still relevant, please
            leave a comment to keep it open.
          stale-pr-message: >
            This pull request has been inactive for 60 days. It will be closed in
            14 days unless there is new activity.
          close-issue-message: >
            This issue has been closed due to inactivity. Feel free to reopen if
            the problem persists or new information becomes available.
          close-pr-message: >
            This pull request has been closed due to inactivity. Please reopen
            with new changes when you are ready to continue.
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
