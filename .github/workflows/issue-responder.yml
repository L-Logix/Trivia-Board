name: Issue Responder

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  respond:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            const labels = issue.labels.map(l => l.name);

            let extra = '';
            if (labels.includes('bug')) {
              extra = '\n\nPlease make sure you have included:\n- Steps to reproduce\n- Your environment (OS, Node.js version, browser)\n- Any relevant error messages or screenshots';
            } else if (labels.includes('enhancement')) {
              extra = '\n\nPlease describe the use case clearly so we can understand how this would benefit a live trivia game.';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Thanks for opening this issue! A maintainer will review it soon.${extra}`
            });
