name: PR Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run stress tests
        id: stress
        run: npm run stress
        continue-on-error: true

      - name: Check new code for inline comments
        id: comments
        run: |
          FAILED=0
          # Look for added lines containing indented // in .js diffs
          for f in $(git diff --name-only origin/main...HEAD -- '*.js'); do
            if [ -f "$f" ]; then
              MATCH=$(git diff origin/main...HEAD -- "$f" | grep '^+[^+]' | grep -oP '^\+\s+//' || true)
              if [ -n "$MATCH" ]; then
                echo "Comments found in $f:"
                git diff origin/main...HEAD -- "$f" | grep '^+[^+]' | grep -P '^\+\s+//'
                FAILED=1
              fi
            fi
          done
          if [ "$FAILED" = "1" ]; then exit 1; fi
        continue-on-error: true

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const stressPassed = '${{ steps.stress.outcome }}' === 'success';
            const commentsClean = '${{ steps.comments.outcome }}' === 'success' || '${{ steps.comments.outcome }}' === 'skipped';

            const body = [];

            if (stressPassed && commentsClean) {
              body.push('## Review: Approved');
              body.push('');
              body.push('- Stress tests: passed');
              body.push('- Code style: clean');
              body.push('');
              body.push('This PR looks good to merge.');
            } else {
              body.push('## Review: Changes requested');
              body.push('');
              if (!stressPassed) {
                body.push('- Stress tests: **failed**');
              } else {
                body.push('- Stress tests: passed');
              }
              if (!commentsClean) {
                body.push('- Code style: **inline comments found**');
              } else {
                body.push('- Code style: clean');
              }
              body.push('');
              if (!stressPassed) {
                body.push('The stress test suite did not pass. Run `npm run stress` locally to diagnose.');
              }
              if (!commentsClean) {
                body.push('Inline comments (lines starting with `//`) were found in changed files. Remove them to match the project style.');
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.join('\n')
            });
