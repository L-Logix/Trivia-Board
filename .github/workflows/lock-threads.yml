name: Lock Threads

on:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  issues: write
  pull-requests: write

jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - uses: dessant/lock-threads@v5
        with:
          issue-inactive-days: 30
          pr-inactive-days: 30
          exclude-any-issue-labels: pinned, security
          log-output: true
