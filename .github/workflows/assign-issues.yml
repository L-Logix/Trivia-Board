name: Auto Assign

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            if (issue.assignee) return; // already assigned

            const labels = issue.labels.map(l => l.name);
            let assignee = null;

            if (labels.includes('bug') && !labels.includes('no-public-action')) {
              assignee = context.repo.owner;
            } else if (labels.includes('dependencies')) {
              return;
            } else if (labels.includes('enhancement') && !labels.includes('no-public-action')) {
              assignee = context.repo.owner;
            }

            if (assignee) {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                assignees: [assignee]
              });
            }

            if (!labels.includes('no-public-action') && !labels.includes('bot-generated') && !labels.includes('good first issue') && !labels.includes('help wanted')) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ['triage']
              });
            }
