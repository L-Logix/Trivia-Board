name: Semantic PR

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  title:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const pattern = /^(feat|fix|docs|refactor|test|chore|ci|style|perf|revert)(\(.+\))?!?:\s.+/;
            if (!pattern.test(title)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: [
                  '## PR Title Format',
                  '',
                  'The PR title does not follow [Conventional Commits](https://www.conventionalcommits.org/):',
                  '',
                  '```',
                  'type(scope): description',
                  '```',
                  '',
                  '**Allowed types:** `feat`, `fix`, `docs`, `refactor`, `test`, `chore`, `ci`, `style`, `perf`, `revert`',
                  '',
                  '**Example:** `fix(timer): prevent duplicate done-reading calls`',
                  '',
                  'Please update the title.'
                ].join('\n')
              });
              core.setFailed('PR title does not follow Conventional Commits format');
            }
