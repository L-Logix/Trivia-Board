name: Size Label

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            const lines = pr.additions + pr.deletions;
            let label;
            if (lines < 10) label = 'size/XS';
            else if (lines < 50) label = 'size/S';
            else if (lines < 200) label = 'size/M';
            else if (lines < 500) label = 'size/L';
            else label = 'size/XL';

            const { data: existing } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            const sizeLabels = existing.map(l => l.name).filter(n => n.startsWith('size/'));
            if (sizeLabels.length) {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: sizeLabels[0]
              });
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [label]
            });
