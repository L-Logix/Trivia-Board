name: Nightly Check

on:
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run stress tests
        id: stress
        run: npm run stress
        continue-on-error: true

      - name: Check for uncommitted files
        id: stale
        run: |
          STALE=$(git ls-files --others --exclude-standard)
          if [ -n "$STALE" ]; then
            echo "STALE_FILES<<EOF" >> $GITHUB_ENV
            echo "$STALE" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            exit 1
          fi
        continue-on-error: true

      - name: Create issue on failure
        if: steps.stress.outcome == 'failure' || steps.stale.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const failures = [];
            if ('${{ steps.stress.outcome }}' === 'failure') failures.push('Stress tests failed');
            if ('${{ steps.stale.outcome }}' === 'failure') failures.push('Uncommitted files found');
            const title = 'Nightly check: ' + failures.join(', ');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'auto-fail'
            });
            if (issues.find(i => i.title.startsWith('Nightly check:'))) {
              console.log('Similar issue already exists, skipping');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              labels: ['auto-fail'],
              body: `## Nightly Check Failure\n\n**Failures:**\n- ${failures.join('\n- ')}\n\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n_This issue was automatically created. No action required._`
            });
