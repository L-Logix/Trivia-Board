name: Worker Bot
on:
  schedule:
    - cron: '0 10 * * 2,5'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  work-on-issues:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find assignable bots-only issue
        id: find
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'bots-only',
              sort: 'created',
              direction: 'asc'
            });
            const target = issues.data.find(i =>
              !i.assignee &&
              !i.pull_request
            );
            if (!target) {
              console.log('No unassigned bots-only issues found');
              core.setOutput('found', 'false');
              return;
            }
            core.setOutput('found', 'true');
            core.setOutput('number', target.number);
            core.setOutput('title', target.title);

      - name: Attempt fix
        id: fix
        if: steps.find.outputs.found == 'true'
        run: |
          TITLE="${{ steps.find.outputs.title }}"
          FIXABLE=false

          if echo "$TITLE" | grep -qi "trailing newline"; then
            for f in $(find src/ -name "*.js" 2>/dev/null); do
              if [ -s "$f" ] && [ "$(tail -c1 "$f" | wc -l)" -eq 0 ]; then
                echo "" >> "$f"
              fi
            done
            FIXABLE=true
          fi

          if echo "$TITLE" | grep -qi "console\.log"; then
            for f in $(grep -rl "console\.log" --include="*.js" src/ 2>/dev/null); do
              sed -i '/console\.log/d' "$f"
            done
            FIXABLE=true
          fi

          if echo "$TITLE" | grep -qi "commented-out"; then
            for f in src/server/socket-handlers.js src/server/game-state.js src/lib/stats.js; do
              if [ -f "$f" ]; then
                sed -i '/^\s*\/\/\s*\(var\|let\|const\|function\|if\|for\|while\|return\|console\)/d' "$f"
              fi
            done
            FIXABLE=true
          fi

          echo "fixable=$FIXABLE" >> $GITHUB_OUTPUT

      - name: Create pull request
        if: steps.fix.outputs.fixable == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'bot: auto-fix for issue #${{ steps.find.outputs.number }}'
          title: 'auto-fix: ${{ steps.find.outputs.title }}'
          body: |
            🤖 Automated fix for issue #${{ steps.find.outputs.number }}.

            _Generated by worker-bot._
          branch: bot/fix-issue-${{ steps.find.outputs.number }}
          base: main
          labels: bot-generated
          delete-branch: true

      - name: Assign and comment on issue
        if: steps.find.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const num = ${{ steps.find.outputs.number }};
            const fixable = '${{ steps.fix.outputs.fixable }}' === 'true';
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: num,
              assignees: ['${{ github.actor }}']
            });
            if (fixable) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: num,
                body: 'Worker bot applied a fix. PR opened for review.'
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: num,
                body: 'Worker bot reviewed this issue but could not apply an automated fix. Manual intervention needed.'
              });
            }
