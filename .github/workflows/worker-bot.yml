name: Worker Bot
on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # ── Batch fix up to 8 issues per run ──
  batch-fix:
    if: github.event_name == 'issues' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Batch fix and create PRs
        uses: actions/github-script@v7
        with:
          script: |
            const execSync = require('child_process').execSync;
            function exec(cmd) {
              return execSync(cmd, { encoding: 'utf8', cwd: process.env.GITHUB_WORKSPACE });
            }

            // Find up to 8 fixable unassigned bots-only issues
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'bots-only',
              sort: 'created',
              direction: 'asc'
            });

            const candidates = issues.data.filter(i => !i.assignee && !i.pull_request);
            const MAX_ISSUES = 8;
            let processed = 0;

            // Helper: find a file by basename under src/ or bin/
            function findFile(basename) {
              try {
                const out = exec('find src/ bin/ -name "' + basename.replace(/"/g, '\\"') + '" 2>/dev/null | head -1');
                return out.trim();
              } catch(e) { return ''; }
            }

            for (const issue of candidates) {
              if (processed >= MAX_ISSUES) break;
              const num = issue.number;
              const title = issue.title;
              let fixable = false;
              let fixDesc = '';
              let safe = false;

              // Check issue title for fix categories
              if (/trailing newline/i.test(title)) {
                // Add trailing newlines to files missing them
                const files = exec('find src/ bin/ -name "*.js" 2>/dev/null');
                const toFix = files.trim().split('\n').filter(f => {
                  try {
                    const out = execSync('test -s "' + f + '" && tail -c1 "' + f + '" | wc -l', { encoding: 'utf8' });
                    return out.trim() === '0';
                  } catch(e) { return false; }
                });
                for (const f of toFix) {
                  exec('echo "" >> "' + f + '"');
                }
                fixable = toFix.length > 0;
                fixDesc = 'Added trailing newlines to ' + toFix.length + ' files';
                safe = true;
              }

              else if (/console\.log/i.test(title)) {
                const fileMatch = title.match(/from\s+(\S+)$/);
                if (fileMatch) {
                  const target = findFile(fileMatch[1]);
                  if (target) {
                    exec('sed -i "/console\\.log/d" "' + target + '"');
                    fixable = true;
                    fixDesc = 'Removed console.log from ' + target;
                    safe = true;
                  }
                } else {
                  exec('for f in $(grep -rl "console\\.log" --include="*.js" src/ 2>/dev/null); do sed -i "/console\\.log/d" "$f"; done');
                  fixable = true;
                  fixDesc = 'Removed console.log statements across src/';
                  safe = true;
                }
              }

              else if (/commented-out/i.test(title)) {
                const fileMatch = title.match(/in\s+(\S+)$/);
                if (fileMatch) {
                  const target = findFile(fileMatch[1]);
                  if (target) {
                    exec('sed -i "/^\\s*\\/\\/\\s*\\(var\\|let\\|const\\|function\\|if\\|for\\|while\\|return\\|console\\)/d" "' + target + '"');
                    fixable = true;
                    fixDesc = 'Removed commented-out code from ' + target;
                    safe = true;
                  }
                }
              }

              else if (/extra blank line|blank lines|consecutive blank/i.test(title)) {
                const fileMatch = title.match(/in\s+(\S+)$/);
                if (fileMatch) {
                  const target = findFile(fileMatch[1]);
                  if (target) {
                    exec('awk "/^$/{n++; if(n>2) next} !/^$/{n=0} 1" "' + target + '" > "' + target + '.tmp" && mv "' + target + '.tmp" "' + target + '"');
                    fixable = true;
                    fixDesc = 'Removed consecutive blank lines from ' + target;
                    safe = true;
                  }
                }
              }

              if (!fixable) continue;

              // Assign issue to bot
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: num,
                assignees: ['github-actions[bot]']
              });

              // Create branch and commit
              const branchName = 'bot/fix-issue-' + num;
              try {
                exec('git branch -D ' + branchName + ' 2>/dev/null || true');
              } catch(e) {}
              exec('git checkout -b ' + branchName + ' main');

              // Stage and commit
              exec('git add -A');
              try {
                exec('git commit -m "fix: ' + title.replace(/"/g, '\\"') + '"');
              } catch(e) {
                exec('git checkout main');
                continue;
              }

              // Push
              try {
                exec('git push origin ' + branchName + ' 2>&1');
              } catch(e) {
                exec('git checkout main');
                continue;
              }

              // Create PR
              const pr = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'fix: ' + title,
                head: branchName,
                base: 'main',
                body: 'Fixes #' + num + '\n\n' + fixDesc + '\n\nAutomated fix by worker-bot.',
                maintainer_can_modify: true
              });

              // Comment on issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: num,
                body: 'Worker bot opened PR #' + pr.data.number + ' for this issue.'
              });

              // Auto-merge if safe
              if (safe) {
                try {
                  await github.rest.pulls.createReview({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pr.data.number,
                    event: 'APPROVE',
                    body: 'Safe fix — auto-approved by worker-bot.'
                  });
                  await github.rest.pulls.merge({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pr.data.number,
                    merge_method: 'squash'
                  });
                } catch(e) {
                  console.log('Auto-merge failed for PR #' + pr.data.number + ': ' + e.message);
                }
              }

              processed++;
              exec('git checkout main');
            }

            console.log('Processed ' + processed + ' issues');

  # ── Respond when a human replies to a bots-only issue ──
  respond-to-reply:
    if: github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const commenter = context.payload.comment.user.login;
            if (commenter === 'github-actions[bot]') return;

            const issueNum = context.payload.issue.number;
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNum
            });

            const labels = issue.data.labels.map(l => l.name);
            if (!labels.includes('bots-only')) return;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNum
            });

            let lastBot = null;
            for (let i = comments.length - 1; i >= 0; i--) {
              if (comments[i].user.login === 'github-actions[bot]' && comments[i].id < context.payload.comment.id) {
                lastBot = comments[i];
                break;
              }
            }
            if (!lastBot) return;

            const reply = (context.payload.comment.body || '').toLowerCase();
            let response;
            if (/good job|looks good|nice|great|well done|awesome|thanks/i.test(reply)) {
              response = 'Worker bot: Thank you! Happy to help keep the codebase clean.';
            } else if (/bad|wrong|broken|not good|failed/i.test(reply)) {
              response = 'Worker bot: Sorry about that. Can you share more details so I can improve?';
            } else if (/remove|delete|clean|not needed|no/i.test(reply)) {
              response = 'Worker bot: Thanks! I will apply these removals.';
            } else if (/keep|need|debug|still|yes/i.test(reply)) {
              response = 'Worker bot: Understood, I will leave them in place.';
            } else {
              response = 'Worker bot: Got it. I will factor this in on the next pass.';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNum,
              body: response
            });

  # ── Respond when a PR is reviewed ──
  respond-to-review:
    if: github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const reviewer = context.payload.review.user.login;
            if (reviewer === 'github-actions[bot]') return;

            const prNum = context.payload.pull_request.number;
            const state = context.payload.review.state;
            const body = (context.payload.review.body || '').toLowerCase();

            let response;
            if (state === 'approved') {
              if (/good job|looks good|nice|great|well done|awesome/i.test(body)) {
                response = 'Worker bot: Thank you for the kind words! Happy to contribute.';
              } else {
                response = 'Worker bot: Thanks for the review and approval!';
              }
            } else if (state === 'changes_requested') {
              response = 'Worker bot: Thanks for the feedback. I will look into the requested changes.';
            } else if (state === 'commented') {
              if (/good job|looks good|nice|great|well done|awesome/i.test(body)) {
                response = 'Worker bot: Thank you! Glad the fix works for you.';
              } else {
                response = 'Worker bot: Thanks for the comment.';
              }
            } else {
              return;
            }

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNum,
              event: 'COMMENT',
              body: response
            });
